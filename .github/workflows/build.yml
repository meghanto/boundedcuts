name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  exact-solver:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure-preset: conan-release
            test-dir: build/Release
          - os: macos-latest
            configure-preset: conan-release
            test-dir: build/Release
          - os: windows-latest
            configure-preset: conan-default
            test-dir: build

    defaults:
      run:
        working-directory: exact_solver

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install "conan==2.30.0"

      - name: Restore dependencies
        run: |
          conan profile detect --force
          conan install . --build=missing -s build_type=Release

      - name: Configure
        run: >-
          cmake --preset ${{ matrix.configure-preset }}
          -DCUTWIDTH_ENABLE_HIGHS=OFF
          -DCUTWIDTH_ENABLE_ONETBB=OFF

      - name: Build
        run: cmake --build --preset conan-release --parallel 2

      - name: Test
        run: ctest --test-dir ${{ matrix.test-dir }} -C Release --output-on-failure

      - name: Verify CLI smoke test
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            exe="build/Release/cutwidth_exact.exe"
          else
            exe="build/Release/cutwidth_exact"
          fi
          output="$("$exe" ../examples/triangle.edgelist --json --verify)"
          python -c 'import json,sys; r=json.load(sys.stdin); assert r["status"] == "OPTIMAL" and r["lower_bound"] == 2 and r["upper_bound"] == 2 and r["verified"] is True' <<< "$output"
